<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Majlis Perkahwinan Syarif & Asma</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #fff0f5, #ffe4e1);
      text-align: center;
      color: #333;
    }

    .container {
      padding: 50px 20px;
    }

    h1 {
      font-size: 40px;
      color: #c2185b;
    }

    h2 {
      font-size: 28px;
      margin-top: 10px;
    }

    p {
      font-size: 18px;
    }

    .box {
      background: white;
      padding: 20px;
      margin: 20px auto;
      max-width: 500px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 20px;
      background: #c2185b;
      color: white;
      text-decoration: none;
      border-radius: 10px;
    }

    .btn:hover {
      background: #a3154a;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Walimatul Urus</h1>
    <h2>Syarif ❤️ Asma</h2>

    <div class="box">
      <p>Dengan penuh kesyukuran, kami menjemput anda ke majlis perkahwinan kami.</p>
      <p><b>Tarikh:</b> 1 Januari 2027</p>
      <p><b>Tempat:</b> Dewan Seri Indah</p>

      <a class="btn" href="#">RSVP (Coming Soon)</a>
    </div>

  </div>

</body>
</html>
